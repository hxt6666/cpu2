name: Build Zygisk Module

on:
  workflow_dispatch:
  push:
    branches

:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          echo "=== Installing NDK 29.0.14206865 ==="
          sdkmanager --install "ndk;29.0.14206865" <<< "y"
          
          echo "=== Checking installed NDKs ==="
          sdkmanager --list_installed | grep ndk

      - name: Build Module
        run: |
          export ANDROID_HOME="$HOME/android-sdk"export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/29.0.14206865"
          
          echo "=== ANDROID_HOME: $ANDROID_HOME ==="
          echo "=== ANDROID_NDK_HOME: $ANDROID_NDK_HOME ==="
          echo "=== NDK contents ==="
          ls -la "$ANDROID_NDK_HOME/" 2>/dev/null || echo "NDK not found at expected path!"
          
          python build.py -t release zip
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-module
          path: release/*.zip
